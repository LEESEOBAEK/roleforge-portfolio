<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RoleForge Portfolio</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f7fafc;
      }
      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 4rem);
        letter-spacing: 0;
      }
      p {
        max-width: 760px;
        line-height: 1.65;
      }
      .hero {
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 22px 70px rgba(25, 39, 52, 0.16);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
        margin-top: 28px;
      }
      figure {
        margin: 0;
        background: white;
        border: 1px solid #d9e2ec;
        border-radius: 10px;
        overflow: hidden;
      }
      figure img {
        display: block;
        width: 100%;
      }
      figcaption {
        padding: 12px 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RoleForge</h1>
      <p>A local-first AI agent workspace with RAG safety hardening, Health Content Studio, automation console, mobile Drive UX, and release-safety workflows.</p>
      <img class="hero" src="assets/screenshots/hero-workspace.png" alt="RoleForge Web Drive workspace">
      <section class="grid" aria-label="Screenshots">
        <figure>
          <img src="assets/screenshots/mobile-drive.png" alt="Mobile Drive">
          <figcaption>Mobile Drive</figcaption>
        </figure>
        <figure>
          <img src="assets/screenshots/brand-icons.png" alt="Unified app icons">
          <figcaption>Unified App Icons</figcaption>
        </figure>
        <figure>
          <img src="assets/screenshots/agent-registry.png" alt="Agent Registry">
          <figcaption>Agent Registry</figcaption>
        </figure>
        <figure>
          <img src="assets/screenshots/release-safety.png" alt="Release Safety">
          <figcaption>Release Safety</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
